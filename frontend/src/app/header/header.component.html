

<header class="navbar" [class.scrolled]="isScrolled">

  <div class="navbar-inner">
    <p-toast position="top-right"></p-toast>

    <!-- LOGO -->
    <a routerLink="/main-menu" class="logo-link" (click)="goToHome()">
      <img src="../../assets/logo.png" alt="Logo Colégio Lumier" class="logo-img">
    </a>

    <!-- LINKS -->
    <nav class="nav-links">

      <a *ngFor="let link of item" [routerLink]="link.routerLink" class="nav-link" routerLinkActive="active">
        {{ link.label }}
      </a>

    </nav>

    <!-- ACTIONS -->
    <div class="nav-actions">

      <!-- ADMIN -->
      <button *ngIf="loginService.isAdmin()" class="admin-btn" (click)="toggleTieredMenu($event)">
        <i class="pi pi-th-large"></i>
        <span>Admin</span>
      </button>


      <button *ngIf="isLoggedIn()" class="logout-btn" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Sair</span>
      </button>

      <!-- Dialog de confirmação -->
      <p-dialog [(visible)]="showLogoutDialog" [style]="{width: '380px'}" [modal]="true" [draggable]="false"
        [closable]="false" styleClass="logout-dialog">

        <ng-template pTemplate="header">
          <div class="logout-dialog-header">
            <div class="logout-icon">👋</div>
            <div>
              <p class="logout-eyebrow">Atenção</p>
              <span class="logout-title">Deseja sair?</span>
            </div>
          </div>
        </ng-template>

        <div class="logout-dialog-body">
          <p>Você será desconectado da sua conta.</p>
        </div>

        <ng-template pTemplate="footer">
          <div class="logout-dialog-footer">
            <button class="dlg-btn cancel" (click)="showLogoutDialog = false">
              Cancelar
            </button>
            <button class="dlg-btn confirm" (click)="confirmLogout()">
              <i class="pi pi-sign-out"></i> Sim, sair
            </button>
          </div>
        </ng-template>
      </p-dialog>

      <!-- MENU -->
      <p-tieredMenu #tieredMenu [model]="items" [popup]="true" styleClass="custom-tiered">
      </p-tieredMenu>

      <!-- MOBILE -->
      <button class="hamburger" (click)="menuVisible = !menuVisible" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

  </div>

</header>

<!-- SIDEBAR -->
<p-sidebar [(visible)]="menuVisible" position="right" styleClass="custom-sidebar">

  <div class="sidebar-header">

    <img src="../../assets/logo.png" alt="Logo" class="sidebar-logo">

  </div>

  <nav class="sidebar-nav">

    <a *ngFor="let link of item" [routerLink]="link.routerLink" class="sidebar-link" (click)="menuVisible = false">
      {{ link.label }}
    </a>

  </nav>

  <div class="sidebar-footer">

    <a class="sidebar-cta" (click)="openWhatsApp(); menuVisible = false">
      <i class="pi pi-whatsapp"></i>
      Fale pelo WhatsApp
    </a>

  </div>

</p-sidebar>
